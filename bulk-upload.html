<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bulk Upload - BookMCQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; }
        .upload-card { background: rgba(255,255,255,0.95); border-radius: 1rem; }
        .preview-table { overflow-x: auto; }
        .preview-table table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .preview-table th, .preview-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .preview-table th { background: #f1f5f9; font-weight: 600; }
        .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; height: 48px; width: 100%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    
    <!-- Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur rounded-full px-6 py-2 mb-4">
            <i class="fas fa-upload text-white"></i>
            <span class="text-white font-semibold">BookMCQ Bulk Upload</span>
        </div>
        <h1 class="text-3xl md:text-4xl font-bold text-white">📤 Bulk Upload Questions</h1>
        <p class="text-white/70 mt-2">Upload hundreds of MCQs at once using CSV or Excel files</p>
    </div>

    <!-- Main Card -->
    <div class="upload-card p-6 md:p-8 shadow-xl">
        
        <!-- Back Link -->
        <div class="mb-6">
            <a href="admin.html" class="text-purple-600 hover:text-purple-800 inline-flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to Admin Panel
            </a>
        </div>

        <!-- Step 1: Select Book -->
        <div class="bg-blue-50 p-4 rounded-lg mb-6">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="bg-blue-600 text-white rounded-full w-6 h-6 inline-flex items-center justify-center text-sm">1</span>
                Select Book
            </h3>
            <div id="bookSelectContainer">
                <div class="skeleton"></div>
            </div>
        </div>

        <!-- Step 2: Select Topic -->
        <div class="bg-blue-50 p-4 rounded-lg mb-6">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="bg-blue-600 text-white rounded-full w-6 h-6 inline-flex items-center justify-center text-sm">2</span>
                Select Topic
            </h3>
            <select id="topicSelect" class="w-full p-3 border rounded-xl bg-white">
                <option>Select book first</option>
            </select>
        </div>

        <!-- Step 3: Download Template -->
        <div class="bg-green-50 p-4 rounded-lg mb-6">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="bg-green-600 text-white rounded-full w-6 h-6 inline-flex items-center justify-center text-sm">3</span>
                Download CSV Template
            </h3>
            <p class="text-sm text-gray-600 mb-3">Download the template, fill with your questions, then upload back.</p>
            <button id="downloadBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 inline-flex items-center gap-2">
                <i class="fas fa-download"></i> Download CSV Template
            </button>
        </div>

        <!-- Step 4: Upload File -->
        <div class="bg-purple-50 p-4 rounded-lg mb-6">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="bg-purple-600 text-white rounded-full w-6 h-6 inline-flex items-center justify-center text-sm">4</span>
                Upload CSV/Excel File
            </h3>
            <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="w-full p-3 border rounded-xl bg-white">
            <button id="uploadBtn" style="display: none; margin-top: 10px;" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 inline-flex items-center gap-2">
                <i class="fas fa-upload"></i> Upload to Database
            </button>
        </div>
        
        <!-- Preview Section -->
        <div id="previewDiv" style="margin-top: 15px; display: none;"></div>
    </div>
</div>

<script>
    // Log function
    function addLog(msg, type = 'info') {
        console.log(msg);
    }
    
    addLog('Script started', 'info');
    
    // ============ CACHE SYSTEM ============
    let booksCache = null;
    let topicsCache = {};
    let isLoading = false;
    
    // Check if libraries loaded
    function checkLibraries() {
        if (typeof window.supabase !== 'undefined') {
            addLog('✅ Supabase detected', 'success');
            return true;
        }
        addLog('⏳ Waiting for Supabase...', 'info');
        return false;
    }
    
    // Main initialization
    function init() {
        if (!checkLibraries()) {
            setTimeout(init, 100);
            return;
        }
        
        // Supabase config
        const SUPABASE_URL = 'https://wnsuuazwcxmuwqyphvse.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qsQzf3RycZtO8Uj1hd3mcg_jaX6iQ9C';
        
        addLog('Creating Supabase client...', 'info');
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        addLog('✅ Supabase client ready', 'success');
        
        let currentQuestions = [];
        
        // Load books with caching
        async function loadBooks() {
            // Return cached data immediately if available
            if (booksCache !== null) {
                addLog(`📦 Using cached books (${booksCache.length} books)`, 'success');
                renderBookSelect(booksCache);
                return;
            }
            
            // Prevent multiple simultaneous loads
            if (isLoading) {
                addLog('⏳ Books already loading, waiting...', 'info');
                return;
            }
            
            isLoading = true;
            addLog('Fetching books from database...', 'info');
            
            try {
                const { data, error } = await supabase.from('books').select('id, title').order('title');
                if (error) throw error;
                
                // Store in cache
                booksCache = data;
                addLog(`✅ Found ${data.length} books (cached)`, 'success');
                renderBookSelect(data);
            } catch(e) {
                addLog(`❌ Error: ${e.message}`, 'error');
                renderBookSelect(null, e.message);
            } finally {
                isLoading = false;
            }
        }
        
        // Render book select dropdown
        function renderBookSelect(books, errorMsg = null) {
            const container = document.getElementById('bookSelectContainer');
            
            if (errorMsg) {
                container.innerHTML = `<div class="text-red-600 p-3 border rounded-xl bg-red-50">Error: ${errorMsg}</div>`;
                return;
            }
            
            if (!books || books.length === 0) {
                container.innerHTML = '<select id="bookSelect" class="w-full p-3 border rounded-xl bg-white"><option value="">-- No books found --</option></select>';
                return;
            }
            
            let html = '<select id="bookSelect" class="w-full p-3 border rounded-xl bg-white">';
            html += '<option value="">-- Select a Book --</option>';
            books.forEach(book => {
                html += `<option value="${book.id}">${escapeHtml(book.title)}</option>`;
            });
            html += '</select>';
            
            container.innerHTML = html;
            
            // Re-attach event listener to the new select element
            const newSelect = document.getElementById('bookSelect');
            if (newSelect) {
                newSelect.addEventListener('change', loadTopics);
            }
        }
        
        // Load topics with caching
        async function loadTopics() {
            const bookId = document.getElementById('bookSelect')?.value;
            const topicSelect = document.getElementById('topicSelect');
            
            if (!bookId) {
                topicSelect.innerHTML = '<option>Select book first</option>';
                return;
            }
            
            // Check cache first
            if (topicsCache[bookId] !== undefined) {
                addLog(`📦 Using cached topics for book ${bookId} (${topicsCache[bookId].length} topics)`, 'success');
                renderTopicSelect(topicsCache[bookId]);
                return;
            }
            
            addLog(`Loading topics for book ${bookId}...`, 'info');
            topicSelect.innerHTML = '<option>Loading topics...</option>';
            
            try {
                const { data, error } = await supabase.from('topics')
                    .select('id, name, chapter_number')
                    .eq('book_id', parseInt(bookId))
                    .order('chapter_number');
                
                if (error) throw error;
                
                // Store in cache
                topicsCache[bookId] = data;
                addLog(`✅ Found ${data.length} topics (cached)`, 'success');
                renderTopicSelect(data);
            } catch(e) {
                addLog(`❌ Error: ${e.message}`, 'error');
                topicSelect.innerHTML = '<option>Error loading topics</option>';
            }
        }
        
        // Render topic select dropdown
        function renderTopicSelect(topics) {
            const topicSelect = document.getElementById('topicSelect');
            
            if (!topics || topics.length === 0) {
                topicSelect.innerHTML = '<option value="">-- No topics found --</option>';
                return;
            }
            
            let html = '<option value="">-- Select a Topic --</option>';
            topics.forEach(topic => {
                const display = topic.chapter_number ? `Ch ${topic.chapter_number}: ${topic.name}` : topic.name;
                html += `<option value="${topic.id}">${escapeHtml(display)}</option>`;
            });
            
            topicSelect.innerHTML = html;
        }
        
        // Preload all topics for books in background (optional performance boost)
        async function preloadTopicsForBooks(books) {
            if (!books || books.length === 0) return;
            
            addLog('🔄 Preloading topics in background...', 'info');
            const promises = books.map(book => 
                supabase.from('topics')
                    .select('id, name, chapter_number')
                    .eq('book_id', book.id)
                    .then(({ data, error }) => {
                        if (!error && data) {
                            topicsCache[book.id] = data;
                        }
                    })
            );
            
            await Promise.all(promises);
            addLog('✅ Topics preloaded successfully', 'success');
        }
        
        // Download template
        function downloadTemplate() {
            addLog('Generating CSV template...', 'info');
            const headers = ['question_text', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_answer', 'difficulty', 'explanation'];
            const example = ['What does typeof null return?', 'null', 'undefined', 'object', 'number', '2', 'easy', 'Historical bug'];
            const csv = [headers.join(','), example.join(',')].join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bookmcq_template.csv';
            a.click();
            URL.revokeObjectURL(url);
            addLog('✅ Template downloaded', 'success');
        }
        
        // Process uploaded file
        function processFile(file) {
            addLog(`Processing: ${file.name}`, 'info');
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet);
                    
                    addLog(`✅ Loaded ${rows.length} questions`, 'success');
                    if (rows.length === 0) return;
                    
                    currentQuestions = rows;
                    
                    // Show preview
                    const previewDiv = document.getElementById('previewDiv');
                    const uploadBtn = document.getElementById('uploadBtn');
                    
                    let html = '<h3 class="font-bold text-gray-700 mb-2">📋 Preview (first 3 rows):</h3>';
                    html += '<div class="preview-table"><table>';
                    const headers = Object.keys(rows[0]);
                    html += '<thead><tr>' + headers.map(h => `<th style="padding:8px; border:1px solid #ccc; text-align:left;">${h}</th>`).join('') + '</tr></thead><tbody>';
                    for (let i = 0; i < Math.min(3, rows.length); i++) {
                        html += '<tr>' + headers.map(h => `<td style="padding:8px; border:1px solid #ccc;">${escapeHtml(String(rows[i][h] || '').substring(0, 50))}</td>`).join('') + '</tr>';
                    }
                    html += '</tbody></table></div>';
                    html += `<p class="text-green-600 text-sm mt-2"><i class="fas fa-check-circle"></i> ✅ ${rows.length} questions ready to upload</p>`;
                    
                    previewDiv.innerHTML = html;
                    previewDiv.style.display = 'block';
                    uploadBtn.style.display = 'inline-flex';
                } catch(e) {
                    addLog(`❌ Parse error: ${e.message}`, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        // Upload to database
        async function uploadToDatabase() {
            const bookId = document.getElementById('bookSelect')?.value;
            const topicId = document.getElementById('topicSelect').value;
            
            if (!bookId || !topicId) {
                addLog('❌ Please select both a book and a topic', 'error');
                alert('Please select both a book and a topic');
                return;
            }
            
            if (!currentQuestions.length) {
                addLog('❌ No questions to upload', 'error');
                alert('No questions to upload. Please select a file first.');
                return;
            }
            
            addLog(`📤 Uploading ${currentQuestions.length} questions...`, 'info');
            let success = 0, failed = 0;
            
            for (let i = 0; i < currentQuestions.length; i++) {
                const q = currentQuestions[i];
                try {
                    const { data, error } = await supabase.from('questions').insert({
                        topic_id: parseInt(topicId),
                        question_text: q.question_text,
                        difficulty: q.difficulty || 'medium',
                        correct_answer: parseInt(q.correct_answer),
                        explanation: q.explanation || ''
                    }).select();
                    
                    if (error) throw error;
                    
                    const options = [q.option_a, q.option_b, q.option_c, q.option_d];
                    for (let j = 0; j < options.length; j++) {
                        await supabase.from('options').insert({
                            question_id: data[0].id,
                            option_text: options[j],
                            option_index: j
                        });
                    }
                    success++;
                    addLog(`✅ ${i+1}/${currentQuestions.length} uploaded`, 'success');
                } catch(e) {
                    failed++;
                    addLog(`❌ ${i+1}/${currentQuestions.length} failed: ${e.message}`, 'error');
                }
            }
            
            addLog(`📊 Complete: ${success} uploaded, ${failed} failed`, success > 0 ? 'success' : 'error');
            alert(`Upload complete!\n${success} questions added\n${failed} failed`);
            
            if (success > 0) {
                document.getElementById('previewDiv').style.display = 'none';
                document.getElementById('uploadBtn').style.display = 'none';
                document.getElementById('fileInput').value = '';
                currentQuestions = [];
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        // Set up event listeners (using event delegation for dynamic elements)
        document.addEventListener('change', function(e) {
            if (e.target && e.target.id === 'bookSelect') {
                loadTopics();
            }
        });
        
        document.getElementById('downloadBtn').addEventListener('click', downloadTemplate);
        document.getElementById('fileInput').addEventListener('change', e => {
            if (e.target.files && e.target.files[0]) processFile(e.target.files[0]);
        });
        document.getElementById('uploadBtn').addEventListener('click', uploadToDatabase);
        
        // Start loading books
        loadBooks().then(() => {
            // After books are loaded, preload topics in background for faster future loads
            if (booksCache && booksCache.length > 0) {
                preloadTopicsForBooks(booksCache);
            }
        });
    }
    
    // Start initialization
    addLog('Checking for Supabase library...', 'info');
    setTimeout(init, 100);
</script>
</body>
</html>
