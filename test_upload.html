<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Bulk Upload Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body class="p-8 bg-gray-100">

<div class="max-w-2xl mx-auto bg-white rounded-xl p-8 shadow-lg">
    <h1 class="text-2xl font-bold mb-6">Simple Bulk Upload Test</h1>
    
    <!-- Simple visible status -->
    <div id="simpleStatus" class="mb-4 p-3 bg-blue-100 rounded-lg font-bold">
        Loading...
    </div>
    
    <!-- Step 1: Select Book and Topic -->
    <div class="mb-6">
        <h2 class="font-bold mb-3">Step 1: Select Target</h2>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold mb-2">Book:</label>
                <select id="bookSelect" class="w-full p-2 border rounded">
                    <option>Loading books...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Topic:</label>
                <select id="topicSelect" class="w-full p-2 border rounded">
                    <option>Select book first</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Step 2: Download Template -->
    <div class="mb-6 p-4 bg-green-50 rounded-lg">
        <h2 class="font-bold mb-3">Step 2: Download CSV Template</h2>
        <button id="downloadBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
            Download CSV Template
        </button>
    </div>

    <!-- Step 3: Upload File -->
    <div class="mb-6 p-4 bg-purple-50 rounded-lg">
        <h2 class="font-bold mb-3">Step 3: Upload CSV/Excel File</h2>
        
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="w-full p-2 border rounded mb-3">
        
        <div id="previewDiv" class="hidden mt-3">
            <h3 class="font-bold mb-2">Preview:</h3>
            <div id="previewContent" class="bg-white p-3 rounded border overflow-x-auto text-sm"></div>
            <button id="uploadBtn" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Upload to Database
            </button>
        </div>
        
        <div id="progressDiv" class="hidden mt-3">
            <div class="bg-gray-200 rounded-full h-2">
                <div id="progressBar" class="bg-green-600 h-2 rounded-full" style="width: 0%"></div>
            </div>
            <p id="progressText" class="text-sm text-gray-600 mt-1"></p>
        </div>
    </div>
</div>

<script>
    // Show status
    function setStatus(message, isError = false) {
        const statusDiv = document.getElementById('simpleStatus');
        statusDiv.innerHTML = message;
        statusDiv.className = `mb-4 p-3 rounded-lg font-bold ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
        console.log(message);
    }
    
    // Supabase config
    const SUPABASE_URL = 'https://wnsuuazwcxmuwqyphvse.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qsQzf3RycZtO8Uj1hd3mcg_jaX6iQ9C';
    
    setStatus('Initializing Supabase...');
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    setStatus('Supabase initialized. Loading books...');
    
    let currentQuestions = [];
    
    // Load books
    async function loadBooks() {
        try {
            setStatus('Fetching books from database...');
            const { data, error } = await supabase.from('books').select('id, title').order('title');
            
            if (error) {
                setStatus('Error loading books: ' + error.message, true);
                return;
            }
            
            const select = document.getElementById('bookSelect');
            select.innerHTML = '<option value="">-- Select a Book --</option>';
            
            if (data && data.length > 0) {
                data.forEach(book => {
                    select.innerHTML += `<option value="${book.id}">${book.title}</option>`;
                });
                setStatus(`✅ Loaded ${data.length} books. Select a book to continue.`);
            } else {
                select.innerHTML = '<option value="">No books found</option>';
                setStatus('❌ No books found. Please add books first.', true);
            }
        } catch(e) {
            setStatus('Error: ' + e.message, true);
        }
    }
    
    // Load topics when book selected
    async function loadTopics() {
        const bookId = document.getElementById('bookSelect').value;
        const topicSelect = document.getElementById('topicSelect');
        
        if (!bookId) {
            topicSelect.innerHTML = '<option value="">Select book first</option>';
            return;
        }
        
        setStatus(`Loading topics for selected book...`);
        
        try {
            const { data, error } = await supabase.from('topics')
                .select('id, name, chapter_number')
                .eq('book_id', parseInt(bookId))
                .order('chapter_number', { ascending: true });
            
            if (error) {
                setStatus('Error loading topics: ' + error.message, true);
                return;
            }
            
            topicSelect.innerHTML = '<option value="">-- Select a Topic --</option>';
            
            if (data && data.length > 0) {
                data.forEach(topic => {
                    const display = topic.chapter_number ? `Ch ${topic.chapter_number}: ${topic.name}` : topic.name;
                    topicSelect.innerHTML += `<option value="${topic.id}">${display}</option>`;
                });
                setStatus(`✅ Loaded ${data.length} topics. Select a topic to continue.`);
            } else {
                topicSelect.innerHTML = '<option value="">No topics found</option>';
                setStatus('❌ No topics found for this book. Please add topics first.', true);
            }
        } catch(e) {
            setStatus('Error: ' + e.message, true);
        }
    }
    
    // Download template
    function downloadTemplate() {
        const headers = ['question_text', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_answer', 'difficulty', 'explanation'];
        const exampleRow = [
            'What does typeof null return?',
            'null',
            'undefined',
            'object',
            'number',
            '2',
            'easy',
            'This is a historical bug in JavaScript'
        ];
        
        const csvContent = [headers.join(','), exampleRow.join(',')].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'bookmcq_template.csv';
        a.click();
        URL.revokeObjectURL(url);
        setStatus('Template downloaded!');
    }
    
    // Process file
    function processFile(file) {
        setStatus(`Processing ${file.name}...`);
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);
                
                if (rows.length === 0) {
                    setStatus('No data found in file', true);
                    return;
                }
                
                currentQuestions = rows;
                
                // Show preview
                const previewDiv = document.getElementById('previewDiv');
                const previewContent = document.getElementById('previewContent');
                
                const headers = Object.keys(rows[0]);
                let html = '<table class="min-w-full border">';
                html += '<tr class="bg-gray-100">';
                headers.forEach(h => { html += `<th class="border p-1 text-left text-xs">${h}</th>`; });
                html += '</tr>';
                
                for (let i = 0; i < Math.min(3, rows.length); i++) {
                    html += '<tr>';
                    headers.forEach(h => { html += `<td class="border p-1 text-xs">${escapeHtml(String(rows[i][h] || ''))}</td>`; });
                    html += '</tr>';
                }
                html += '</table>';
                html += `<p class="mt-2 text-sm">Total: ${rows.length} questions loaded</p>`;
                
                previewContent.innerHTML = html;
                previewDiv.classList.remove('hidden');
                setStatus(`✅ Loaded ${rows.length} questions. Ready to upload.`);
            } catch(err) {
                setStatus('Error parsing file: ' + err.message, true);
            }
        };
        reader.onerror = () => setStatus('Error reading file', true);
        reader.readAsArrayBuffer(file);
    }
    
    // Upload to database
    async function uploadToDatabase() {
        const bookId = document.getElementById('bookSelect').value;
        const topicId = document.getElementById('topicSelect').value;
        
        if (!bookId || !topicId) {
            setStatus('Please select both a book and a topic', true);
            return;
        }
        
        if (!currentQuestions || currentQuestions.length === 0) {
            setStatus('No questions to upload. Please select a file first.', true);
            return;
        }
        
        const progressDiv = document.getElementById('progressDiv');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        progressDiv.classList.remove('hidden');
        setStatus(`Uploading ${currentQuestions.length} questions...`);
        
        let success = 0;
        let failed = 0;
        
        for (let i = 0; i < currentQuestions.length; i++) {
            const row = currentQuestions[i];
            const percent = Math.round(((i + 1) / currentQuestions.length) * 100);
            progressBar.style.width = `${percent}%`;
            progressText.textContent = `Processing ${i + 1} of ${currentQuestions.length} (${percent}%)`;
            
            try {
                // Insert question
                const { data: qData, error: qError } = await supabase.from('questions').insert([{
                    topic_id: parseInt(topicId),
                    question_text: row.question_text,
                    difficulty: row.difficulty || 'medium',
                    correct_answer: parseInt(row.correct_answer),
                    explanation: row.explanation || ''
                }]).select();
                
                if (qError) throw qError;
                
                // Insert options
                const options = [row.option_a, row.option_b, row.option_c, row.option_d];
                for (let j = 0; j < options.length; j++) {
                    await supabase.from('options').insert([{
                        question_id: qData[0].id,
                        option_text: options[j],
                        option_index: j
                    }]);
                }
                success++;
            } catch(err) {
                failed++;
                console.error('Error:', err);
            }
        }
        
        progressText.textContent = `Complete! ${success} uploaded, ${failed} failed`;
        setStatus(`✅ Upload complete: ${success} questions added, ${failed} failed`);
        
        setTimeout(() => {
            progressDiv.classList.add('hidden');
            document.getElementById('previewDiv').classList.add('hidden');
            document.getElementById('fileInput').value = '';
            currentQuestions = [];
        }, 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Setup event listeners
    document.getElementById('bookSelect').addEventListener('change', loadTopics);
    document.getElementById('downloadBtn').addEventListener('click', downloadTemplate);
    document.getElementById('fileInput').addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            processFile(e.target.files[0]);
        }
    });
    document.getElementById('uploadBtn').addEventListener('click', uploadToDatabase);
    
    // Load books on page load
    loadBooks();
</script>
</body>
</html>
