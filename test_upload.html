<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bulk Upload - Debug Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body class="p-8 bg-gray-100">

<div class="max-w-2xl mx-auto bg-white rounded-xl p-8 shadow-lg">
    <h1 class="text-2xl font-bold mb-6">Bulk Upload Test - Debug Version</h1>
    
    <!-- Debug Info -->
    <div id="debugInfo" class="mb-4 p-3 bg-yellow-50 rounded-lg text-sm font-mono">
        Checking connection...
    </div>
    
    <!-- Step 1: Select Book and Topic -->
    <div class="mb-6">
        <h2 class="font-bold mb-3">Step 1: Select Target</h2>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold mb-2">Book:</label>
                <select id="testBookId" class="w-full p-2 border rounded">
                    <option value="">Loading books...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Topic:</label>
                <select id="testTopicId" class="w-full p-2 border rounded">
                    <option value="">Select book first</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Step 2: Download Template -->
    <div class="mb-6 p-4 bg-green-50 rounded-lg">
        <h2 class="font-bold mb-3">Step 2: Download CSV Template</h2>
        <button id="testDownloadBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
            📥 Download CSV Template
        </button>
    </div>

    <!-- Step 3: Upload File -->
    <div class="mb-6 p-4 bg-purple-50 rounded-lg">
        <h2 class="font-bold mb-3">Step 3: Upload CSV/Excel File</h2>
        
        <div id="testUploadZone" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-purple-500 hover:bg-purple-50 transition">
            <p class="text-gray-600">📁 Click or drag & drop CSV/Excel file here</p>
            <p class="text-gray-400 text-sm mt-1">Supports .csv, .xlsx, .xls</p>
            <input type="file" id="testFileInput" accept=".csv,.xlsx,.xls" class="hidden">
        </div>
        
        <div id="testPreviewSection" class="hidden mt-4">
            <h3 class="font-bold mb-2">Preview (First 5 rows)</h3>
            <div class="overflow-x-auto">
                <table id="testPreviewTable" class="min-w-full bg-white border text-sm">
                    <thead id="testPreviewHeader" class="bg-gray-100"></thead>
                    <tbody id="testPreviewBody"></tbody>
                </table>
            </div>
            <button id="testUploadBtn" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                📤 Upload to Database
            </button>
        </div>
        
        <div id="testProgress" class="hidden mt-4">
            <div class="flex justify-between text-sm mb-1">
                <span>Uploading...</span>
                <span id="testProgressPercent">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="testProgressFill" class="bg-green-600 h-2 rounded-full" style="width: 0%"></div>
            </div>
            <p id="testProgressStatus" class="text-sm text-gray-600 mt-2"></p>
        </div>
    </div>

    <!-- Status -->
    <div id="testStatus" class="p-3 rounded-lg bg-gray-100 text-sm"></div>
</div>

<script>
    // Supabase configuration
    const SUPABASE_URL = 'https://wnsuuazwcxmuwqyphvse.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qsQzf3RycZtO8Uj1hd3mcg_jaX6iQ9C';
    
    let supabase;
    let pendingData = [];
    
    // Initialize Supabase
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        updateDebugInfo('Supabase initialized', 'success');
    } catch(e) {
        updateDebugInfo('Supabase init error: ' + e.message, 'error');
    }
    
    function updateDebugInfo(message, type) {
        const debugDiv = document.getElementById('debugInfo');
        const color = type === 'error' ? 'text-red-600' : (type === 'success' ? 'text-green-600' : 'text-blue-600');
        debugDiv.innerHTML += `<div class="${color}">${new Date().toLocaleTimeString()}: ${message}</div>`;
        debugDiv.scrollTop = debugDiv.scrollHeight;
    }
    
    function showStatus(message, isError = false) {
        const statusDiv = document.getElementById('testStatus');
        statusDiv.innerHTML = message;
        statusDiv.className = `p-3 rounded-lg text-sm ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
        setTimeout(() => {
            if (statusDiv.innerHTML === message) {
                statusDiv.className = 'p-3 rounded-lg bg-gray-100 text-sm';
                statusDiv.innerHTML = 'Ready';
            }
        }, 3000);
    }
    
    // Test connection
    async function testConnection() {
        try {
            updateDebugInfo('Testing Supabase connection...', 'info');
            const { data, error } = await supabase.from('books').select('count');
            if (error) {
                updateDebugInfo('Connection failed: ' + error.message, 'error');
                return false;
            }
            updateDebugInfo('Connection successful!', 'success');
            return true;
        } catch(e) {
            updateDebugInfo('Connection error: ' + e.message, 'error');
            return false;
        }
    }
    
    // Load books
    async function loadBooks() {
        updateDebugInfo('Loading books...', 'info');
        const select = document.getElementById('testBookId');
        
        try {
            const { data, error } = await supabase.from('books').select('id, title').order('title');
            
            if (error) {
                updateDebugInfo('Books error: ' + error.message, 'error');
                select.innerHTML = '<option value="">Error: ' + error.message + '</option>';
                showStatus('Error loading books: ' + error.message, true);
                return;
            }
            
            updateDebugInfo(`Found ${data ? data.length : 0} books`, 'success');
            
            if (data && data.length > 0) {
                select.innerHTML = '<option value="">-- Select Book --</option>';
                data.forEach(book => {
                    select.innerHTML += `<option value="${book.id}">${escapeHtml(book.title)}</option>`;
                });
                showStatus(`Loaded ${data.length} books`);
            } else {
                select.innerHTML = '<option value="">No books found. Please add a book first.</option>';
                showStatus('No books found. Go to Books tab to add one.', true);
            }
        } catch(e) {
            updateDebugInfo('Books exception: ' + e.message, 'error');
            select.innerHTML = '<option value="">Error loading books</option>';
        }
    }
    
    // Load topics when book selected
    async function loadTopics() {
        const bookId = document.getElementById('testBookId').value;
        const topicSelect = document.getElementById('testTopicId');
        
        if (!bookId) {
            topicSelect.innerHTML = '<option value="">Select book first</option>';
            return;
        }
        
        updateDebugInfo(`Loading topics for book ID: ${bookId}`, 'info');
        
        try {
            const { data, error } = await supabase.from('topics')
                .select('id, name, chapter_number')
                .eq('book_id', parseInt(bookId))
                .order('chapter_number', { ascending: true });
            
            if (error) {
                updateDebugInfo('Topics error: ' + error.message, 'error');
                topicSelect.innerHTML = '<option value="">Error loading topics</option>';
                return;
            }
            
            updateDebugInfo(`Found ${data ? data.length : 0} topics`, 'success');
            
            topicSelect.innerHTML = '<option value="">-- Select Topic --</option>';
            if (data && data.length > 0) {
                data.forEach(topic => {
                    const display = topic.chapter_number ? `Ch ${topic.chapter_number}: ${topic.name}` : topic.name;
                    topicSelect.innerHTML += `<option value="${topic.id}">${escapeHtml(display)}</option>`;
                });
            } else {
                topicSelect.innerHTML = '<option value="">No topics found for this book</option>';
                showStatus('No topics for this book. Add topics first.', true);
            }
        } catch(e) {
            updateDebugInfo('Topics exception: ' + e.message, 'error');
            topicSelect.innerHTML = '<option value="">Error loading topics</option>';
        }
    }
    
    // Download template
    function downloadTemplate() {
        const headers = ['question_text', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_answer', 'difficulty', 'explanation'];
        const exampleRow = [
            'What does typeof null return?',
            'null',
            'undefined',
            'object',
            'number',
            '2',
            'easy',
            'This is a historical bug in JavaScript'
        ];
        
        const csvContent = [headers.join(','), exampleRow.join(',')].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'bookmcq_template.csv';
        a.click();
        URL.revokeObjectURL(url);
        showStatus('Template downloaded!');
        updateDebugInfo('Template downloaded', 'success');
    }
    
    // Setup file upload
    function setupFileUpload() {
        const uploadZone = document.getElementById('testUploadZone');
        const fileInput = document.getElementById('testFileInput');
        
        if (!uploadZone) {
            updateDebugInfo('Upload zone not found!', 'error');
            return;
        }
        
        updateDebugInfo('Setting up file upload handlers', 'info');
        
        // Click on upload zone triggers file input
        uploadZone.addEventListener('click', () => {
            updateDebugInfo('Upload zone clicked', 'info');
            fileInput.click();
        });
        
        // File input change
        fileInput.addEventListener('change', (e) => {
            updateDebugInfo('File selected: ' + (e.target.files[0] ? e.target.files[0].name : 'none'), 'info');
            if (e.target.files && e.target.files[0]) {
                processFile(e.target.files[0]);
            }
        });
        
        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('border-purple-500', 'bg-purple-50');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('border-purple-500', 'bg-purple-50');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('border-purple-500', 'bg-purple-50');
            const file = e.dataTransfer.files[0];
            updateDebugInfo('File dropped: ' + (file ? file.name : 'none'), 'info');
            if (file) {
                processFile(file);
            }
        });
    }
    
    // Process uploaded file
    function processFile(file) {
        updateDebugInfo(`Processing file: ${file.name} (${Math.round(file.size/1024)} KB)`, 'info');
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);
                
                updateDebugInfo(`Parsed ${rows.length} rows from file`, 'success');
                
                if (rows.length === 0) {
                    showStatus('No data found in file', true);
                    return;
                }
                
                pendingData = rows;
                displayPreview(rows);
                showStatus(`✅ Loaded ${rows.length} questions from ${file.name}`);
            } catch (err) {
                updateDebugInfo('Parse error: ' + err.message, 'error');
                showStatus('Error reading file: ' + err.message, true);
            }
        };
        reader.onerror = () => {
            updateDebugInfo('FileReader error', 'error');
            showStatus('Error reading file', true);
        };
        reader.readAsArrayBuffer(file);
    }
    
    // Display preview
    function displayPreview(rows) {
        const previewSection = document.getElementById('testPreviewSection');
        const previewHeader = document.getElementById('testPreviewHeader');
        const previewBody = document.getElementById('testPreviewBody');
        
        if (!rows || rows.length === 0) return;
        
        const headers = Object.keys(rows[0]);
        previewHeader.innerHTML = `<tr>${headers.map(h => `<th class="p-2 border text-left">${h}</th>`).join('')}</tr>`;
        
        const previewRows = rows.slice(0, 5);
        previewBody.innerHTML = previewRows.map(row => `
            <tr>
                ${headers.map(h => `<td class="p-2 border">${escapeHtml(String(row[h] || ''))}</td>`).join('')}
            </tr>
        `).join('');
        
        previewSection.classList.remove('hidden');
        updateDebugInfo(`Preview displayed with ${headers.length} columns`, 'success');
    }
    
    // Upload to database
    async function uploadToDatabase() {
        const bookId = document.getElementById('testBookId').value;
        const topicId = document.getElementById('testTopicId').value;
        
        updateDebugInfo(`Upload requested - Book ID: ${bookId}, Topic ID: ${topicId}`, 'info');
        
        if (!bookId || !topicId) {
            showStatus('Please select both a book and a topic', true);
            updateDebugInfo('Missing book or topic selection', 'error');
            return;
        }
        
        if (!pendingData || pendingData.length === 0) {
            showStatus('No data to upload. Please select a file first.', true);
            updateDebugInfo('No pending data to upload', 'error');
            return;
        }
        
        const progressDiv = document.getElementById('testProgress');
        const progressFill = document.getElementById('testProgressFill');
        const progressPercent = document.getElementById('testProgressPercent');
        const progressStatus = document.getElementById('testProgressStatus');
        
        progressDiv.classList.remove('hidden');
        updateDebugInfo(`Starting upload of ${pendingData.length} questions`, 'info');
        
        let successCount = 0;
        let errorCount = 0;
        
        for (let i = 0; i < pendingData.length; i++) {
            const row = pendingData[i];
            const percent = Math.round(((i + 1) / pendingData.length) * 100);
            progressFill.style.width = `${percent}%`;
            progressPercent.textContent = `${percent}%`;
            progressStatus.textContent = `Processing question ${i + 1} of ${pendingData.length}...`;
            
            try {
                // Insert question
                const { data: qData, error: qError } = await supabase.from('questions').insert([{
                    topic_id: parseInt(topicId),
                    question_text: row.question_text,
                    difficulty: row.difficulty || 'medium',
                    correct_answer: parseInt(row.correct_answer),
                    explanation: row.explanation || ''
                }]).select();
                
                if (qError) throw qError;
                
                // Insert options
                const options = [row.option_a, row.option_b, row.option_c, row.option_d];
                for (let j = 0; j < options.length; j++) {
                    await supabase.from('options').insert([{
                        question_id: qData[0].id,
                        option_text: options[j],
                        option_index: j
                    }]);
                }
                successCount++;
            } catch (err) {
                errorCount++;
                updateDebugInfo(`Error on row ${i+1}: ${err.message}`, 'error');
            }
        }
        
        progressStatus.textContent = `Complete! ${successCount} uploaded, ${errorCount} failed.`;
        updateDebugInfo(`Upload complete: ${successCount} success, ${errorCount} failed`, 'success');
        showStatus(`✅ Upload complete: ${successCount} questions added, ${errorCount} failed`);
        
        setTimeout(() => {
            progressDiv.classList.add('hidden');
            document.getElementById('testPreviewSection').classList.add('hidden');
            document.getElementById('testFileInput').value = '';
            pendingData = [];
        }, 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Initialize everything
    async function init() {
        updateDebugInfo('Initializing test page...', 'info');
        
        // Test connection first
        const connected = await testConnection();
        if (!connected) {
            showStatus('Cannot connect to database. Check your credentials.', true);
            return;
        }
        
        // Load books
        await loadBooks();
        
        // Setup event listeners
        document.getElementById('testBookId').addEventListener('change', loadTopics);
        document.getElementById('testDownloadBtn').addEventListener('click', downloadTemplate);
        document.getElementById('testUploadBtn').addEventListener('click', uploadToDatabase);
        
        // Setup file upload
        setupFileUpload();
        
        showStatus('✅ Ready! Select a book and topic, then upload your CSV file');
    }
    
    // Start
    init();
</script>
</body>
</html>
