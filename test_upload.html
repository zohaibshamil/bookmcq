<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Upload Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .container { max-width: 800px; margin: 0 auto; background: #16213e; padding: 20px; border-radius: 10px; }
        select, button, input { padding: 8px 12px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #0f3460; color: white; cursor: pointer; }
        button:hover { background: #e94560; }
        .log { background: #0f0f1a; padding: 10px; margin-top: 20px; border-radius: 5px; height: 300px; overflow-y: auto; font-size: 12px; }
        .log-entry { margin: 5px 0; padding: 3px; border-left: 3px solid; }
        .success { border-left-color: #4CAF50; color: #4CAF50; }
        .error { border-left-color: #f44336; color: #f44336; }
        .info { border-left-color: #2196F3; color: #2196F3; }
        select { background: #0f0f1a; color: white; }
        input { background: #0f0f1a; color: white; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="container">
    <h1>🔧 Minimal Upload Test</h1>
    
    <div>
        <h3>1. Select Book</h3>
        <select id="bookSelect" style="width: 100%;">
            <option>Loading books...</option>
        </select>
    </div>
    
    <div style="margin-top: 15px;">
        <h3>2. Select Topic</h3>
        <select id="topicSelect" style="width: 100%;">
            <option>Select book first</option>
        </select>
    </div>
    
    <div style="margin-top: 15px;">
        <h3>3. Download Template</h3>
        <button id="downloadBtn">📥 Download CSV Template</button>
    </div>
    
    <div style="margin-top: 15px;">
        <h3>4. Upload CSV/Excel</h3>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
        <button id="uploadBtn" style="display: none;">Upload to Database</button>
    </div>
    
    <div id="preview" style="margin-top: 15px; display: none;">
        <h3>Preview:</h3>
        <div id="previewContent"></div>
    </div>
    
    <div class="log">
        <h3>📋 Console Log:</h3>
        <div id="log"></div>
    </div>
</div>

<script>
    // Log function
    function addLog(message, type = 'info') {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(message);
    }
    
    // Supabase credentials
    const SUPABASE_URL = 'https://wnsuuazwcxmuwqyphvse.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qsQzf3RycZtO8Uj1hd3mcg_jaX6iQ9C';
    
    addLog('Starting...', 'info');
    addLog(`Supabase URL: ${SUPABASE_URL}`, 'info');
    
    // Create client
    let supabase;
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        addLog('✅ Supabase client created', 'success');
    } catch(e) {
        addLog(`❌ Failed to create client: ${e.message}`, 'error');
    }
    
    let currentQuestions = [];
    
    // Load books
    async function loadBooks() {
        addLog('Loading books from database...', 'info');
        
        try {
            const { data, error } = await supabase.from('books').select('id, title');
            
            if (error) {
                addLog(`❌ Error loading books: ${error.message}`, 'error');
                addLog(`Error details: ${JSON.stringify(error)}`, 'error');
                return;
            }
            
            addLog(`✅ Found ${data ? data.length : 0} books`, 'success');
            
            const select = document.getElementById('bookSelect');
            select.innerHTML = '<option value="">-- Select a Book --</option>';
            
            if (data && data.length > 0) {
                data.forEach(book => {
                    select.innerHTML += `<option value="${book.id}">${book.title}</option>`;
                });
                addLog(`Loaded books: ${data.map(b => b.title).join(', ')}`, 'success');
            } else {
                select.innerHTML = '<option value="">No books found</option>';
                addLog('⚠️ No books in database. Please add books first.', 'error');
            }
        } catch(e) {
            addLog(`❌ Exception: ${e.message}`, 'error');
        }
    }
    
    // Load topics
    async function loadTopics() {
        const bookId = document.getElementById('bookSelect').value;
        addLog(`Loading topics for book ID: ${bookId}`, 'info');
        
        if (!bookId) {
            document.getElementById('topicSelect').innerHTML = '<option>Select book first</option>';
            return;
        }
        
        try {
            const { data, error } = await supabase.from('topics')
                .select('id, name, chapter_number')
                .eq('book_id', parseInt(bookId));
            
            if (error) {
                addLog(`❌ Error loading topics: ${error.message}`, 'error');
                return;
            }
            
            addLog(`✅ Found ${data ? data.length : 0} topics`, 'success');
            
            const select = document.getElementById('topicSelect');
            select.innerHTML = '<option value="">-- Select a Topic --</option>';
            
            if (data && data.length > 0) {
                data.forEach(topic => {
                    const display = topic.chapter_number ? `Ch ${topic.chapter_number}: ${topic.name}` : topic.name;
                    select.innerHTML += `<option value="${topic.id}">${display}</option>`;
                });
                addLog(`Loaded topics: ${data.map(t => t.name).join(', ')}`, 'success');
            } else {
                select.innerHTML = '<option value="">No topics found</option>';
                addLog('⚠️ No topics for this book. Add topics first.', 'error');
            }
        } catch(e) {
            addLog(`❌ Exception: ${e.message}`, 'error');
        }
    }
    
    // Download template
    function downloadTemplate() {
        addLog('Downloading CSV template...', 'info');
        
        const headers = ['question_text', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_answer', 'difficulty', 'explanation'];
        const exampleRow = [
            'What does typeof null return?',
            'null',
            'undefined',
            'object',
            'number',
            '2',
            'easy',
            'This is a historical bug in JavaScript'
        ];
        
        const csvContent = [headers.join(','), exampleRow.join(',')].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'bookmcq_template.csv';
        a.click();
        URL.revokeObjectURL(url);
        
        addLog('✅ Template downloaded', 'success');
    }
    
    // Process file
    function processFile(file) {
        addLog(`Processing file: ${file.name} (${file.size} bytes)`, 'info');
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                addLog(`Workbook parsed: ${workbook.SheetNames.length} sheets`, 'success');
                
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);
                
                addLog(`Found ${rows.length} rows in file`, 'success');
                
                if (rows.length === 0) {
                    addLog('❌ No data in file', 'error');
                    return;
                }
                
                currentQuestions = rows;
                
                // Show preview
                const previewDiv = document.getElementById('preview');
                const previewContent = document.getElementById('previewContent');
                const uploadBtn = document.getElementById('uploadBtn');
                
                const headers = Object.keys(rows[0]);
                let html = '<table border="1" style="border-collapse: collapse; width: 100%;">';
                html += '<tr>';
                headers.forEach(h => { html += `<th style="padding: 5px; text-align: left;">${h}</th>`; });
                html += '</table>';
                
                for (let i = 0; i < Math.min(3, rows.length); i++) {
                    html += '<tr>';
                    headers.forEach(h => { html += `<td style="padding: 5px;">${String(rows[i][h] || '').substring(0, 50)}</td>`; });
                    html += '</tr>';
                }
                html += '</table>';
                html += `<p>✅ Total: ${rows.length} questions ready to upload</p>`;
                
                previewContent.innerHTML = html;
                previewDiv.style.display = 'block';
                uploadBtn.style.display = 'inline-block';
                
                addLog(`✅ Preview ready: ${rows.length} questions`, 'success');
            } catch(err) {
                addLog(`❌ Parse error: ${err.message}`, 'error');
            }
        };
        reader.onerror = () => addLog('❌ File read error', 'error');
        reader.readAsArrayBuffer(file);
    }
    
    // Upload to database
    async function uploadToDatabase() {
        const bookId = document.getElementById('bookSelect').value;
        const topicId = document.getElementById('topicSelect').value;
        
        addLog(`Uploading to DB - Book: ${bookId}, Topic: ${topicId}`, 'info');
        
        if (!bookId || !topicId) {
            addLog('❌ Please select both book and topic', 'error');
            return;
        }
        
        if (!currentQuestions.length) {
            addLog('❌ No questions to upload', 'error');
            return;
        }
        
        let success = 0;
        let failed = 0;
        
        for (let i = 0; i < currentQuestions.length; i++) {
            const row = currentQuestions[i];
            addLog(`Processing ${i+1}/${currentQuestions.length}: ${row.question_text?.substring(0, 50)}...`, 'info');
            
            try {
                // Insert question
                const { data: qData, error: qError } = await supabase.from('questions').insert({
                    topic_id: parseInt(topicId),
                    question_text: row.question_text,
                    difficulty: row.difficulty || 'medium',
                    correct_answer: parseInt(row.correct_answer),
                    explanation: row.explanation || ''
                }).select();
                
                if (qError) throw qError;
                
                // Insert options
                const options = [row.option_a, row.option_b, row.option_c, row.option_d];
                for (let j = 0; j < options.length; j++) {
                    await supabase.from('options').insert({
                        question_id: qData[0].id,
                        option_text: options[j],
                        option_index: j
                    });
                }
                success++;
                addLog(`✅ Question ${i+1} uploaded`, 'success');
            } catch(err) {
                failed++;
                addLog(`❌ Question ${i+1} failed: ${err.message}`, 'error');
            }
        }
        
        addLog(`📊 Upload complete: ${success} success, ${failed} failed`, success > 0 ? 'success' : 'error');
        
        if (success > 0) {
            alert(`Upload complete!\n${success} questions added\n${failed} failed`);
        }
    }
    
    // Event listeners
    document.getElementById('bookSelect').addEventListener('change', loadTopics);
    document.getElementById('downloadBtn').addEventListener('click', downloadTemplate);
    document.getElementById('fileInput').addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            processFile(e.target.files[0]);
        }
    });
    document.getElementById('uploadBtn').addEventListener('click', uploadToDatabase);
    
    // Load books on start
    addLog('Starting book load...', 'info');
    loadBooks();
</script>
</body>
</html>
