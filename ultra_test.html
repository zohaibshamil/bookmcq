<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Simple Test</title>
</head>
<body style="font-family: Arial; padding: 20px; background: #000; color: #0f0;">
    <h1>Ultra Simple Test</h1>
    
    <div id="output" style="background: #111; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace;"></div>
    
    <hr>
    
    <div>
        <h3>Step 1: Select Book</h3>
        <select id="bookSelect" style="width: 100%; padding: 10px;">
            <option>Loading...</option>
        </select>
    </div>
    
    <div style="margin-top: 10px;">
        <h3>Step 2: Select Topic</h3>
        <select id="topicSelect" style="width: 100%; padding: 10px;">
            <option>Select book first</option>
        </select>
    </div>
    
    <div style="margin-top: 10px;">
        <h3>Step 3: Download Template</h3>
        <button id="downloadBtn" style="padding: 10px 20px; background: green; color: white; border: none;">Download CSV</button>
    </div>
    
    <div style="margin-top: 10px;">
        <h3>Step 4: Upload File</h3>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="padding: 10px;">
        <button id="uploadBtn" style="padding: 10px 20px; background: blue; color: white; border: none; display: none;">Upload to DB</button>
    </div>
    
    <div id="preview" style="margin-top: 10px; display: none;"></div>

    <script>
        // Simple log function
        function log(msg) {
            const output = document.getElementById('output');
            const p = document.createElement('div');
            p.textContent = new Date().toLocaleTimeString() + ': ' + msg;
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
            console.log(msg);
        }
        
        log('Script started...');
        
        // Supabase credentials
        const SUPABASE_URL = 'https://wnsuuazwcxmuwqyphvse.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qsQzf3RycZtO8Uj1hd3mcg_jaX6iQ9C';
        
        log('Loading Supabase library...');
        
        // Load Supabase dynamically
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = function() {
            log('Supabase library loaded');
            
            // Load SheetJS
            const sheetScript = document.createElement('script');
            sheetScript.src = 'https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
            sheetScript.onload = function() {
                log('SheetJS library loaded');
                init();
            };
            sheetScript.onerror = function() { log('ERROR: Failed to load SheetJS'); };
            document.head.appendChild(sheetScript);
        };
        script.onerror = function() { log('ERROR: Failed to load Supabase'); };
        document.head.appendChild(script);
        
        let supabase = null;
        let currentQuestions = [];
        
        function init() {
            log('Initializing Supabase client...');
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                log('✅ Supabase client created');
                loadBooks();
            } catch(e) {
                log('❌ ERROR: ' + e.message);
            }
        }
        
        async function loadBooks() {
            log('Loading books from database...');
            try {
                const { data, error } = await supabase.from('books').select('id, title').order('title');
                
                if (error) {
                    log('❌ Database error: ' + error.message);
                    return;
                }
                
                log('✅ Found ' + (data ? data.length : 0) + ' books');
                
                const select = document.getElementById('bookSelect');
                select.innerHTML = '<option value="">-- Select Book --</option>';
                
                if (data && data.length > 0) {
                    for (let book of data) {
                        select.innerHTML += `<option value="${book.id}">${book.title}</option>`;
                    }
                    log('Books loaded: ' + data.map(b => b.title).join(', '));
                } else {
                    select.innerHTML = '<option value="">No books found</option>';
                    log('⚠️ No books in database');
                }
            } catch(e) {
                log('❌ Exception: ' + e.message);
            }
        }
        
        async function loadTopics() {
            const bookId = document.getElementById('bookSelect').value;
            log('Loading topics for book ID: ' + bookId);
            
            if (!bookId) {
                document.getElementById('topicSelect').innerHTML = '<option>Select book first</option>';
                return;
            }
            
            try {
                const { data, error } = await supabase.from('topics')
                    .select('id, name, chapter_number')
                    .eq('book_id', parseInt(bookId))
                    .order('chapter_number', { ascending: true });
                
                if (error) {
                    log('❌ Topics error: ' + error.message);
                    return;
                }
                
                log('✅ Found ' + (data ? data.length : 0) + ' topics');
                
                const select = document.getElementById('topicSelect');
                select.innerHTML = '<option value="">-- Select Topic --</option>';
                
                if (data && data.length > 0) {
                    for (let topic of data) {
                        const display = topic.chapter_number ? `Ch ${topic.chapter_number}: ${topic.name}` : topic.name;
                        select.innerHTML += `<option value="${topic.id}">${display}</option>`;
                    }
                } else {
                    select.innerHTML = '<option value="">No topics found</option>';
                    log('⚠️ No topics for this book');
                }
            } catch(e) {
                log('❌ Exception: ' + e.message);
            }
        }
        
        function downloadTemplate() {
            log('Downloading template...');
            const headers = ['question_text', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_answer', 'difficulty', 'explanation'];
            const exampleRow = ['What does typeof null return?', 'null', 'undefined', 'object', 'number', '2', 'easy', 'Historical bug'];
            
            let csv = headers.join(',') + '\n' + exampleRow.join(',');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'template.csv';
            a.click();
            URL.revokeObjectURL(url);
            log('✅ Template downloaded');
        }
        
        function processFile(file) {
            log('Processing file: ' + file.name);
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet);
                    
                    log('✅ Parsed ' + rows.length + ' questions');
                    
                    if (rows.length === 0) return;
                    
                    currentQuestions = rows;
                    
                    // Preview
                    const previewDiv = document.getElementById('preview');
                    previewDiv.style.display = 'block';
                    previewDiv.innerHTML = '<strong>Preview (first 3 questions):</strong><br><pre style="background:#111; padding:10px; overflow-x:auto;">' + 
                        JSON.stringify(rows.slice(0,3), null, 2) + 
                        '</pre><p>Total: ' + rows.length + ' questions ready</p>';
                    
                    document.getElementById('uploadBtn').style.display = 'inline-block';
                    log('✅ Preview ready');
                } catch(e) {
                    log('❌ Parse error: ' + e.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        async function uploadToDatabase() {
            const bookId = document.getElementById('bookSelect').value;
            const topicId = document.getElementById('topicSelect').value;
            
            log('Uploading to database...');
            log('Book ID: ' + bookId + ', Topic ID: ' + topicId);
            
            if (!bookId || !topicId) {
                log('❌ Please select both book and topic');
                return;
            }
            
            if (!currentQuestions.length) {
                log('❌ No questions to upload');
                return;
            }
            
            let success = 0, failed = 0;
            
            for (let i = 0; i < currentQuestions.length; i++) {
                const row = currentQuestions[i];
                log(`Processing ${i+1}/${currentQuestions.length}: ${String(row.question_text).substring(0, 40)}...`);
                
                try {
                    const { data: qData, error: qError } = await supabase.from('questions').insert({
                        topic_id: parseInt(topicId),
                        question_text: row.question_text,
                        difficulty: row.difficulty || 'medium',
                        correct_answer: parseInt(row.correct_answer),
                        explanation: row.explanation || ''
                    }).select();
                    
                    if (qError) throw qError;
                    
                    const options = [row.option_a, row.option_b, row.option_c, row.option_d];
                    for (let j = 0; j < options.length; j++) {
                        await supabase.from('options').insert({
                            question_id: qData[0].id,
                            option_text: options[j],
                            option_index: j
                        });
                    }
                    success++;
                } catch(e) {
                    failed++;
                    log('❌ Error: ' + e.message);
                }
            }
            
            log(`✅ Complete: ${success} uploaded, ${failed} failed`);
            alert(`Upload complete!\n${success} added\n${failed} failed`);
        }
        
        // Setup event listeners
        document.getElementById('bookSelect').addEventListener('change', loadTopics);
        document.getElementById('downloadBtn').addEventListener('click', downloadTemplate);
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) processFile(e.target.files[0]);
        });
        document.getElementById('uploadBtn').addEventListener('click', uploadToDatabase);
        
        log('Waiting for libraries to load...');
    </script>
</body>
</html>
