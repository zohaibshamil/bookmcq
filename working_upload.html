<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Bulk Upload - Final Version</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #eee; }
        .container { max-width: 800px; margin: 0 auto; background: #16213e; padding: 20px; border-radius: 10px; }
        select, button, input { padding: 10px; margin: 5px; border-radius: 5px; border: none; background: #0f0f1a; color: white; }
        button { background: #0f3460; cursor: pointer; }
        button:hover { background: #e94560; }
        .log { background: #0f0f1a; padding: 10px; margin-top: 20px; border-radius: 5px; height: 200px; overflow-y: auto; font-size: 12px; font-family: monospace; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
        select, input { width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container">
    <h1>✅ Working Bulk Upload</h1>
    
    <div class="log" id="log">
        <div>Loading...</div>
    </div>
    
    <div style="margin-top: 20px;">
        <h3>Step 1: Select Book</h3>
        <select id="bookSelect">
            <option>Loading books...</option>
        </select>
    </div>
    
    <div style="margin-top: 15px;">
        <h3>Step 2: Select Topic</h3>
        <select id="topicSelect">
            <option>Select book first</option>
        </select>
    </div>
    
    <div style="margin-top: 15px;">
        <h3>Step 3: Download Template</h3>
        <button id="downloadBtn">📥 Download CSV Template</button>
    </div>
    
    <div style="margin-top: 15px;">
        <h3>Step 4: Upload CSV/Excel</h3>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
        <button id="uploadBtn" style="display: none; margin-top: 10px;">📤 Upload to Database</button>
    </div>
    
    <div id="previewDiv" style="margin-top: 15px; display: none;"></div>
</div>

<script>
    // Log function
    function log(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = type;
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(msg);
    }
    
    log('Script starting...', 'info');
    
    // Supabase configuration
    const SUPABASE_URL = 'https://wnsuuazwcxmuwqyphvse.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qsQzf3RycZtO8Uj1hd3mcg_jaX6iQ9C';
    
    let supabase = null;
    let currentQuestions = [];
    
    // Load Supabase using global import
    log('Loading Supabase...', 'info');
    
    // Use the UMD version which works globally
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/@supabase/supabase-js@2/dist/umd/index.js';
    script.onload = function() {
        log('Supabase loaded', 'success');
        // Supabase is available as supabaseJs
        supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
        log('Supabase client created', 'success');
        loadBooks();
    };
    script.onerror = function() {
        log('Failed to load Supabase', 'error');
    };
    document.head.appendChild(script);
    
    // Load SheetJS
    const sheetScript = document.createElement('script');
    sheetScript.src = 'https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
    sheetScript.onload = function() {
        log('SheetJS loaded', 'success');
    };
    sheetScript.onerror = function() {
        log('Failed to load SheetJS', 'error');
    };
    document.head.appendChild(sheetScript);
    
    async function loadBooks() {
        log('Loading books...', 'info');
        try {
            const { data, error } = await supabase.from('books').select('id, title').order('title');
            if (error) throw error;
            
            log(`Found ${data.length} books`, 'success');
            const select = document.getElementById('bookSelect');
            select.innerHTML = '<option value="">-- Select Book --</option>';
            data.forEach(book => {
                select.innerHTML += `<option value="${book.id}">${escapeHtml(book.title)}</option>`;
            });
        } catch(e) {
            log('Error loading books: ' + e.message, 'error');
        }
    }
    
    async function loadTopics() {
        const bookId = document.getElementById('bookSelect').value;
        if (!bookId) {
            document.getElementById('topicSelect').innerHTML = '<option>Select book first</option>';
            return;
        }
        
        log(`Loading topics for book ${bookId}...`, 'info');
        try {
            const { data, error } = await supabase.from('topics')
                .select('id, name, chapter_number')
                .eq('book_id', parseInt(bookId))
                .order('chapter_number');
            
            if (error) throw error;
            
            log(`Found ${data.length} topics`, 'success');
            const select = document.getElementById('topicSelect');
            select.innerHTML = '<option value="">-- Select Topic --</option>';
            data.forEach(topic => {
                const display = topic.chapter_number ? `Ch ${topic.chapter_number}: ${topic.name}` : topic.name;
                select.innerHTML += `<option value="${topic.id}">${display}</option>`;
            });
        } catch(e) {
            log('Error loading topics: ' + e.message, 'error');
        }
    }
    
    function downloadTemplate() {
        log('Downloading template...', 'info');
        const headers = ['question_text', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_answer', 'difficulty', 'explanation'];
        const example = ['What does typeof null return?', 'null', 'undefined', 'object', 'number', '2', 'easy', 'Historical bug'];
        const csv = [headers.join(','), example.join(',')].join('\n');
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'template.csv';
        a.click();
        URL.revokeObjectURL(url);
        log('Template downloaded', 'success');
    }
    
    function processFile(file) {
        log(`Processing ${file.name}...`, 'info');
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                log(`Loaded ${rows.length} questions`, 'success');
                if (rows.length === 0) return;
                
                currentQuestions = rows;
                
                // Show preview
                const previewDiv = document.getElementById('previewDiv');
                const uploadBtn = document.getElementById('uploadBtn');
                
                let html = '<h3>Preview (first 3 rows):</h3><table border="1" style="border-collapse:collapse; width:100%;">';
                const headers = Object.keys(rows[0]);
                html += '<tr>' + headers.map(h => `<th style="padding:5px; border:1px solid #333;">${h}</th>`).join('') + '</tr>';
                for (let i = 0; i < Math.min(3, rows.length); i++) {
                    html += '<tr>' + headers.map(h => `<td style="padding:5px; border:1px solid #333;">${escapeHtml(String(rows[i][h] || '').substring(0, 50))}</td>`).join('') + '</tr>';
                }
                html += '</table><p>Total: ' + rows.length + ' questions ready</p>';
                
                previewDiv.innerHTML = html;
                previewDiv.style.display = 'block';
                uploadBtn.style.display = 'inline-block';
            } catch(e) {
                log('Parse error: ' + e.message, 'error');
            }
        };
        reader.readAsArrayBuffer(file);
    }
    
    async function uploadToDatabase() {
        const bookId = document.getElementById('bookSelect').value;
        const topicId = document.getElementById('topicSelect').value;
        
        if (!bookId || !topicId) {
            log('Please select book and topic', 'error');
            return;
        }
        
        if (!currentQuestions.length) {
            log('No questions to upload', 'error');
            return;
        }
        
        log(`Uploading ${currentQuestions.length} questions...`, 'info');
        let success = 0, failed = 0;
        
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            try {
                const { data, error } = await supabase.from('questions').insert({
                    topic_id: parseInt(topicId),
                    question_text: q.question_text,
                    difficulty: q.difficulty || 'medium',
                    correct_answer: parseInt(q.correct_answer),
                    explanation: q.explanation || ''
                }).select();
                
                if (error) throw error;
                
                const opts = [q.option_a, q.option_b, q.option_c, q.option_d];
                for (let j = 0; j < opts.length; j++) {
                    await supabase.from('options').insert({
                        question_id: data[0].id,
                        option_text: opts[j],
                        option_index: j
                    });
                }
                success++;
                log(`✅ Question ${i+1}/${currentQuestions.length} uploaded`, 'success');
            } catch(e) {
                failed++;
                log(`❌ Question ${i+1} failed: ${e.message}`, 'error');
            }
        }
        
        log(`Complete: ${success} uploaded, ${failed} failed`, success > 0 ? 'success' : 'error');
        if (success > 0) {
            alert(`Upload complete!\n${success} questions added\n${failed} failed`);
            document.getElementById('previewDiv').style.display = 'none';
            document.getElementById('uploadBtn').style.display = 'none';
            document.getElementById('fileInput').value = '';
            currentQuestions = [];
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // Event listeners
    document.getElementById('bookSelect').addEventListener('change', loadTopics);
    document.getElementById('downloadBtn').addEventListener('click', downloadTemplate);
    document.getElementById('fileInput').addEventListener('change', e => {
        if (e.target.files[0]) processFile(e.target.files[0]);
    });
    document.getElementById('uploadBtn').addEventListener('click', uploadToDatabase);
    
    log('Ready - waiting for libraries...', 'info');
</script>
</body>
</html>
