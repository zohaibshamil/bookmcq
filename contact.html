<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contact Us - BookMCQ</title>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5WGZ1P0EV1"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5WGZ1P0EV1');

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .nav-link.active::after { width: 100%; }
    </style>
</head>
<body class="disable-select">
<div class="max-w-6xl mx-auto px-4">
    
    <nav class="bg-white/10 backdrop-blur-lg rounded-full px-4 md:px-6 py-3 mb-8 sticky top-4 z-50 shadow-lg">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-graduation-cap text-white text-xl md:text-2xl"></i>
                <span class="text-white font-bold text-lg md:text-xl">BookMCQ</span>
            </div>
            <div class="desktop-menu flex gap-3 md:gap-6">
                <a href="index.html" class="nav-link text-white/80 hover:text-white transition">🏠 Home</a>
                <a href="index.html#quiz" class="nav-link text-white/80 hover:text-white transition">📝 Quiz</a>
                <a href="index.html#practice" class="nav-link text-white/80 hover:text-white transition">📚 Practice</a>
                <a href="about.html" class="nav-link text-white/80 hover:text-white transition">📖 About</a>
                <a href="contact.html" class="nav-link active text-white transition">📧 Contact</a>
                <a href="privacy.html" class="nav-link text-white/80 hover:text-white transition">🔒 Privacy</a>
            </div>
        </div>
    </nav>

    <div class="quiz-card rounded-2xl p-6 md:p-8 shadow-xl">
        <div class="text-center mb-8">
            <i class="fas fa-envelope text-5xl text-purple-600 mb-4"></i>
            <h2 class="text-3xl font-bold mb-4">Contact Us</h2>
            <p class="text-gray-600">Have questions? We'd love to hear from you!</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h3 class="text-xl font-bold mb-4">Get in Touch</h3>
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-envelope text-purple-600 w-6"></i>
                        <span class="text-gray-600">support@bookmcq.com</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <i class="fab fa-twitter text-purple-600 w-6"></i>
                        <span class="text-gray-600">@bookmcq</span>
                    </div>
                </div>
            </div>
            <div>
                <h3 class="text-xl font-bold mb-4">Send a Message</h3>
                <form id="contactForm">
                    <input type="text" placeholder="Your Name" class="w-full p-3 border rounded-xl mb-3 text-sm" required>
                    <input type="email" placeholder="Your Email" class="w-full p-3 border rounded-xl mb-3 text-sm" required>
                    <textarea rows="4" placeholder="Your Message" class="w-full p-3 border rounded-xl mb-3 text-sm" required></textarea>
                    <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-xl hover:bg-purple-700 transition">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-center text-white/60 text-xs md:text-sm py-6">
        <p>&copy; 2025 BookMCQ. All rights reserved. | Master Every Chapter</p>
    </footer>
</div>
<script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault();
    });
    document.getElementById('contactForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Thank you for your message! We\'ll get back to you soon.');
        this.reset();
    });
</script>
</body>
</html>
